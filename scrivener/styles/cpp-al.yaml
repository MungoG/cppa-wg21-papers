inherits: default
name: "C++ Alliance"
description: "C++ Alliance letterhead with Noto Condensed typography"

fonts:
  body:
    font: noto-sans
    axes: { wdth: 75, wght: 400 }
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Sans:wdth,wght@75,400&display=swap"
  body_bold:
    font: noto-sans
    axes: { wdth: 75, wght: 537 }
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Sans:wdth,wght@75,537&display=swap"
  body_italic:
    font: noto-serif-italic
    axes: { wdth: 75, wght: 400 }
    size_adjust: 0.95
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wdth,wght@1,75,400&display=swap"
  body_bold_italic:
    font: noto-serif-italic
    axes: { wdth: 75, wght: 537 }
    size_adjust: 0.95
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wdth,wght@1,75,537&display=swap"
  code:
    font: noto-sans-mono
    axes: { wdth: 62.5, wght: 400 }
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wdth,wght@62.5,400&display=swap"
  code_bold:
    font: noto-sans-mono
    axes: { wdth: 62.5, wght: 600 }
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wdth,wght@62.5,600&display=swap"
  code_italic:
    font: noto-sans-mono
    axes: { wdth: 62.5, wght: 400 }
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wdth,wght@62.5,400&display=swap"
  code_bold_italic:
    font: noto-sans-mono
    axes: { wdth: 62.5, wght: 600 }
    web_url: "https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wdth,wght@62.5,600&display=swap"

front_matter:
  fields:
    - { field: document, label: "Document Number" }
    - { field: date, label: Date }
    - { field: intent, label: "Intent", transform: { info: "Inform", ask: "Ask" } }
    - { field: audience, label: Audience }
    - { field: reply-to, label: "Reply-to" }
